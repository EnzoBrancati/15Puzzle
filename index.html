<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 Puzzle</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: lightgreen;
            text-align: center;
            height: 100vh;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #game-board-container {
            padding: 20px;
            background-color: rgb(51, 6, 6);
            background-image: url("wood-pattern.png");
            border-radius: 10px;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            position: relative;
            background-color: black;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #game-info {
            margin: 10px 0;
            font-size: 16px;
            display: flex;
        }

        #game-info p {
            margin: 5px 0;
            color: #333;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <h1>15 Puzzle</h1>
        <div id="game-info">
            <p>Time: <span id="time-counter">0</span> seconnds</p>
            <p>Moves: <span id="move-counter">0</span></p>
        </div>
        <div id="game-board-container">
            <div id="game-board"></div>
        </div>
        <div id="controls">
            <button id="toggle-animation-btn">Disable Animations</button>
            <button id="restart-btn">Restart</button>
        </div>
</body>

</html>
